<!-- libs/shared/ui/ui-feedback/components/ui-empty-state/ui-empty-state.component.html -->

<section
  class="ui-empty"
  role="region"
  aria-live="polite"
  [attr.aria-labelledby]="titleId"
  [attr.aria-label]="message?.title"
>
  <div *ngIf="icon" class="ui-empty__icon" aria-hidden="true">
    {{ icon }}
  </div>

  <h2 class="ui-empty__title" [id]="titleId">
    {{ message.title }}
  </h2>

  <p *ngIf="message.message" class="ui-empty__message">
    {{ message.message }}
  </p>

  <div class="ui-empty__actions" *ngIf="actions.length">
    <button *ngFor="let action of actions" type="button" (click)="onActionClick(action)">
      {{ action.label }}
    </button>
  </div>
</section>
