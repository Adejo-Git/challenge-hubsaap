<!-- Loading State -->
<div *ngIf="isLoading()" class="loading-container">
  <div class="spinner"></div>
  <p>Carregando Hub-Saap...</p>
</div>

<!-- Error State -->
<div *ngIf="hasError()">
  <hub-error-page 
    type="crash" 
    [details]="errorDetails()" 
    (actionTaken)="executeBootstrap()">
  </hub-error-page>
</div>

<!-- Main Layout (após bootstrap completo) -->
<div *ngIf="isBootstrapComplete() && !hasError()" class="app-shell">
  <!-- Topbar -->
  <header class="topbar">
    <!-- TODO: Substituir por <hub-topbar> quando disponível -->
    <div class="topbar-fallback">
      <div class="logo">Hub-Saap</div>
      <div class="user-info">
        <span *ngIf="currentUser()">{{ currentUser().name }}</span>
        <button (click)="onLogout()" class="logout-btn">Sair</button>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- TODO: Substituir por <hub-sidebar> quando disponível -->
    <nav class="sidebar-fallback">
      <ul>
        <li *ngFor="let item of navigationTree()">
          <a [routerLink]="item.path">{{ item.label }}</a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Content (Main) -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <!-- Right Panel -->
  <aside class="right-panel">
    <hub-notification-center></hub-notification-center>
  </aside>
</div>
